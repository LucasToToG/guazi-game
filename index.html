<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>嗑会儿瓜子</title>
<link rel="icon" href="素材/标签页图标.png">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#e9e2d2;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;cursor:default;}
  #ui{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:10px;align-items:flex-end;z-index:10;}
  #counter{font:500 15px/1 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    color:rgba(107,81,58,.55);user-select:none;-webkit-user-select:none;}
  #goldCounter{font:500 15px/1 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    color:rgba(200,146,42,.85);align-items:center;gap:4px;user-select:none;-webkit-user-select:none;}
  #goldCounter img{height:24px;display:block;}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#e9e2d2;z-index:100;font:500 18px/1 "PingFang SC","Microsoft YaHei",sans-serif;color:#6b513a;}
</style>
</head>
<body>
<div id="loading">加载中…</div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="counter" style="display:none;">0</div>
  <div id="goldCounter" style="display:none;"><img src="素材/金瓜子仁-新版.png" alt="金瓜子"><span id="goldNum">0</span></div>
</div>
<script>
'use strict';

/* ================= 图片加载 ================= */
const ASSETS = {}, ASP = {};
const IMG_SRC = {
  seedThin:'素材/瓜子-瘦.png', seedFat:'素材/瓜子-胖.png',
  shellThin:'素材/瓜子壳-完整-瘦-新版.png', shellFat:'素材/瓜子壳-完整-胖-新版2.png',
  kernelThin:'素材/瓜子仁-瘦.png', kernelFat:'素材/瓜子仁-胖.png', kernelGold:'素材/金瓜子仁-新版.png',
  debris4:'素材/瓜子壳-碎屑4.png', debris5:'素材/瓜子壳-碎屑5.png',
  bag:'素材/左上角包装-新版.png',
};
Promise.all(Object.entries(IMG_SRC).map(([k, src]) =>
  new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => { ASSETS[k] = img; res(); };
    img.onerror = () => rej(src);
    img.src = src;
  })
)).then(() => {
  for (const [k, img] of Object.entries(ASSETS)) ASP[k] = img.width / img.height;
  init();
}).catch(src => {
  document.getElementById('loading').textContent = '素材加载失败: ' + src;
});

function init() {
document.getElementById('loading').style.display = 'none';

/* ================= 基础 ================= */
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const bg = document.createElement('canvas'), bgx = bg.getContext('2d');
const layer = document.createElement('canvas'), lyx = layer.getContext('2d');
let W = 0, H = 0, DPR = 1;

/* 噪点纹理 */
const noiseC = document.createElement('canvas');
noiseC.width = noiseC.height = 140;
(() => {
  const g = noiseC.getContext('2d');
  const id = g.createImageData(140, 140);
  for (let i = 0; i < id.data.length; i += 4) {
    const v = (Math.random() * 255) | 0;
    id.data[i] = id.data[i+1] = id.data[i+2] = v;
    id.data[i+3] = 13;
  }
  g.putImageData(id, 0, 0);
})();
let noisePat = null;

/* 软阴影 */
const shadowC = document.createElement('canvas');
shadowC.width = shadowC.height = 128;
(() => {
  const g = shadowC.getContext('2d');
  const rg = g.createRadialGradient(64, 64, 4, 64, 64, 62);
  rg.addColorStop(0, 'rgba(82,52,22,0.42)');
  rg.addColorStop(1, 'rgba(82,52,22,0)');
  g.fillStyle = rg;
  g.fillRect(0, 0, 128, 128);
})();
function drawShadow(g, x, y, rx, ry, alpha) {
  g.save(); g.globalAlpha = alpha; g.translate(x, y);
  g.scale(rx / 64, ry / 64); g.drawImage(shadowC, -64, -64); g.restore();
}

/* ================= 工具 ================= */
const rnd = (a, b) => a + Math.random() * (b - a);
const lerp = (a, b, t) => a + (b - a) * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

/* ================= 瓜子配置 ================= */
const SEED_H = { normal: 78, big: 90, gold: 78 };
const MAX_SEEDS = 100;  // 桌面瓜子上限

/* 预缩放精灵：原图近千像素高，每帧实时缩放太贵；先缩到展示尺寸的 2 倍 */
const SPRITES = {};
for (const k of ['seedThin', 'seedFat']) {
  const h = 220, w = Math.ceil(h * ASP[k]);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(ASSETS[k], 0, 0, w, h);
  SPRITES[k] = c;
}
let sinceGold = 99;  // 距上一颗金瓜子的间隔，刚出过金则压低概率防连出
function rollType() {
  sinceGold++;
  const goldP = sinceGold < 12 ? 0.004 : 0.03;
  const r = Math.random();
  if (r < goldP) { sinceGold = 0; return 'gold'; }
  return r < goldP + 0.10 ? 'big' : 'normal';
}
function rollVariant() { return Math.random() < 0.5 ? 'thin' : 'fat'; }
function shellImg(variant) { return variant === 'thin' ? ASSETS.shellThin : ASSETS.shellFat; }
function kernelImg(type, variant) {
  if (type === 'gold') return ASSETS.kernelGold;
  return variant === 'thin' ? ASSETS.kernelThin : ASSETS.kernelFat;
}

/* ================= 状态 ================= */
const seeds = [], shells = [], kernels = [], goldParts = [], crumbs = [];
let pressedSeed = null;
let pourQueue = 0, pourTimer = 0;
let shake = { t: 0, mag: 0 };
let hoverPtr = false;
let now = 0;

let total = 0;
let goldN = 0;
const muted = false;
const BAG_LIMIT = 800;
let bagCount = 0;
let needSweep = false;
let trashBounce = 0;

const counterEl = document.getElementById('counter');
const goldCounterEl = document.getElementById('goldCounter');
const goldNumEl = document.getElementById('goldNum');
let goldShown = goldN;
function refreshCounter() {
  if (total > 0) {
    counterEl.style.display = '';
    counterEl.textContent = total;
  }
  if (goldShown > 0) {
    goldCounterEl.style.display = 'flex';
    goldNumEl.textContent = goldShown;
  }
}
refreshCounter();

/* ================= 音效 ================= */
const crackSounds = [new Audio('音效/嗑瓜子-1.WAV'), new Audio('音效/嗑瓜子-2.WAV'), new Audio('音效/嗑瓜子-3.WAV')];
const eatSounds = [new Audio('音效/吃瓜子仁-1.WAV'), new Audio('音效/吃瓜子仁-2.WAV')];
const pourSound = new Audio('音效/倒瓜子.WAV');
const bgmTracks = [new Audio('音效/背景音乐1.mp3'), new Audio('音效/背景音乐2.mp3')];
[...crackSounds, ...eatSounds, pourSound, ...bgmTracks].forEach(a => { a.preload = 'auto'; a._vol = 1; });
eatSounds.forEach(a => a._vol = 0.4);
bgmTracks.forEach(a => { a._vol = 0.5; a.volume = 0; });
let audioUnlocked = false;
let bgmStarted = false;
let bgmIndex = 0;
let bgmFade = null;
const BGM_FADE_SEC = 4;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  [...crackSounds, ...eatSounds].forEach(a => {
    a.volume = 0;
    a.play().then(() => { a.pause(); a.currentTime = 0; a.volume = a._vol; }).catch(() => {});
  });
  startBGM();
}
function fadeAudio(from, to, done) {
  if (bgmFade) cancelAnimationFrame(bgmFade);
  const start = performance.now();
  const fromStart = from ? from.volume : 0;
  const toTarget = to._vol;
  function step(ts) {
    const p = clamp((ts - start) / (BGM_FADE_SEC * 1000), 0, 1);
    const e = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
    if (from) from.volume = lerp(fromStart, 0, e);
    to.volume = lerp(0, toTarget, e);
    if (p < 1) bgmFade = requestAnimationFrame(step);
    else {
      bgmFade = null;
      if (from) { from.pause(); from.currentTime = 0; }
      to.volume = toTarget;
      if (done) done();
    }
  }
  bgmFade = requestAnimationFrame(step);
}
function playBGMTrack(index, crossfadeFrom = null) {
  const track = bgmTracks[index];
  track.currentTime = 0;
  track.volume = crossfadeFrom ? 0 : track._vol;
  const p = track.play();
  if (p && p.catch) p.catch(() => { bgmStarted = false; });
  if (crossfadeFrom) fadeAudio(crossfadeFrom, track);
}
function switchBGM() {
  const from = bgmTracks[bgmIndex];
  bgmIndex = (bgmIndex + 1) % bgmTracks.length;
  playBGMTrack(bgmIndex, from);
}
function startBGM() {
  if (muted || bgmStarted) return;
  bgmStarted = true;
  playBGMTrack(bgmIndex);
}
function updateBGM() {
  if (!bgmStarted || bgmFade) return;
  const track = bgmTracks[bgmIndex];
  if (!Number.isFinite(track.duration) || track.duration <= BGM_FADE_SEC) return;
  if (track.duration - track.currentTime <= BGM_FADE_SEC) switchBGM();
}
bgmTracks.forEach((track, index) => {
  track.addEventListener('ended', () => {
    if (index !== bgmIndex || bgmFade) return;
    switchBGM();
  });
});

let AC = null, noiseBuf = null;
function ensureAudio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    } catch (e) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
}
function playMouseClick() {
  if (!AC) return;
  const t = AC.currentTime;
  // 鼠标"嗒"声：高频极短噪声，清脆利落
  [[0, 5200, 0.85, 0.014], [0.05, 4300, 0.4, 0.012]].forEach(([dl, fr, vol, dur]) => {
    const src = AC.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = fr; f.Q.value = 0.8;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol, t + dl);
    g.gain.exponentialRampToValueAtTime(0.001, t + dl + dur);
    src.connect(f); f.connect(g); g.connect(AC.destination);
    src.start(t + dl); src.stop(t + dl + dur + 0.02);
  });
}
function playCrack() {
  if (muted) return;
  if (fishMode) { playMouseClick(); return; }
  const a = crackSounds[(Math.random() * 3) | 0];
  a.currentTime = 0;
  a.play().catch(() => {});
}
function playEat() {
  if (muted || fishMode) return;
  const a = eatSounds[(Math.random() * 2) | 0];
  a.volume = a._vol;
  a.currentTime = 0;
  a.play().catch(() => {});
}
function playDing() {
  if (muted || !AC || fishMode) return;
  const t = AC.currentTime;
  // 超级玛丽金币式：B5 短促起音 → E6 延音衰减
  [[987.77, 0, 0.085, 0.09], [1318.51, 0.085, 0.75, 0.8]].forEach(([fr, dl, dur, stop]) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'square'; o.frequency.value = fr;
    g.gain.setValueAtTime(0.0001, t + dl);
    g.gain.exponentialRampToValueAtTime(0.085, t + dl + 0.006);
    g.gain.exponentialRampToValueAtTime(0.001, t + dl + dur);
    o.connect(g); g.connect(AC.destination); o.start(t + dl); o.stop(t + dl + stop);
  });
}
function playPour() {
  if (muted || fishMode) return;
  pourSound.currentTime = 0;
  pourSound.play().catch(() => {});
}
function playSweep() {
  if (muted || !AC || fishMode) return;
  const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
  const f = AC.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(500, t);
  f.frequency.exponentialRampToValueAtTime(2600, t + 0.18);
  f.frequency.exponentialRampToValueAtTime(350, t + 0.5);
  const g = AC.createGain(); g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.3, t + 0.12);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  src.connect(f); f.connect(g); g.connect(AC.destination); src.start(t); src.stop(t + 0.6);
}

/* ================= 桌面背景 ================= */
function paintBG() {
  bgx.fillStyle = '#e9e2d2';
  bgx.fillRect(0, 0, W, H);
  bgx.lineWidth = 1.5;
  let ly = 36;
  while (ly < H + 40) {
    bgx.strokeStyle = 'rgba(133,115,92,' + (0.025 + Math.abs(Math.sin(ly * 2.7)) * 0.025).toFixed(3) + ')';
    bgx.lineWidth = 1.0 + Math.abs(Math.sin(ly * 0.9)) * 0.8;
    bgx.beginPath(); bgx.moveTo(-10, ly);
    for (let x = 0; x <= W + 40; x += 26)
      bgx.lineTo(x, ly
        + Math.sin(x * 0.012 + ly * 1.7) * 4.5
        + Math.sin(x * 0.004 + ly * 0.6) * 7
        + Math.sin(x * 0.03 + ly * 3.1) * 1.4);
    bgx.stroke();
    ly += 26 + Math.abs(Math.sin(ly * 1.3)) * 42;
  }
  bgx.strokeStyle = 'rgba(110,95,72,0.05)'; bgx.lineWidth = 2;
  for (let y = 175; y < H; y += 315) { bgx.beginPath(); bgx.moveTo(0, y); bgx.lineTo(W, y); bgx.stroke(); }
  const lg = bgx.createLinearGradient(W, 0, W * 0.3, H);
  lg.addColorStop(0, 'rgba(252,249,238,0.45)'); lg.addColorStop(0.55, 'rgba(252,249,238,0)');
  bgx.globalAlpha = 0.5; bgx.fillStyle = lg; bgx.fillRect(0, 0, W, H); bgx.globalAlpha = 1;
  const vg = bgx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.45, W / 2, H / 2, Math.max(W, H) * 0.75);
  vg.addColorStop(0, 'rgba(88,72,52,0)'); vg.addColorStop(1, 'rgba(88,72,52,0.12)');
  bgx.fillStyle = vg; bgx.fillRect(0, 0, W, H);
}

/* ================= 瓜子袋 ================= */
const BAG = { wig: 0 };
let bagDrawH = 500, bagDrawW = 294;
let bagHover = 0, bagHoverTarget = 0;
function bagMetrics() {
  bagDrawH = Math.min(520, H * 0.68);
  bagDrawW = bagDrawH * ASP.bag;
}
function drawBag(g) {
  g.save();
  const wig = BAG.wig > 0 ? Math.sin(BAG.wig * 22) * 0.04 * BAG.wig : 0;
  const peek = bagHover * 26;
  const bx = bagDrawW * 0.04 + peek, by = bagDrawH * 0.08 + peek;
  g.translate(bx, by);
  g.rotate(-0.78 + wig);
  drawShadow(g, 16, bagDrawH * 0.42, bagDrawW * 0.36, bagDrawH * 0.07, 0.4);
  g.drawImage(ASSETS.bag, -bagDrawW / 2, -bagDrawH * 0.5, bagDrawW, bagDrawH);
  g.restore();
}
function mouthPoint() {
  const peek = bagHover * 26;
  const bx = bagDrawW * 0.04 + peek, by = bagDrawH * 0.08 + peek;
  const rot = -0.78;
  const ly = bagDrawH * 0.42;
  return { x: bx + Math.sin(-rot) * ly + 25, y: by + Math.cos(-rot) * ly + 10 };
}
function bagHitTest(px, py) {
  return px < bagDrawW * 0.5 + 30 && py < bagDrawH * 0.5 + 20;
}

/* ================= 倒瓜子 ================= */
function findSpot() {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random());
    const x = clamp(W * 0.50 + Math.cos(a) * r * W * 0.45, 70, W - 70);
    const y = clamp(H * 0.52 + Math.sin(a) * r * H * 0.42, 110, H - 90);
    if (x < bagDrawW * 0.55 && y < bagDrawH * 0.6) continue;
    let ok = true;
    for (const s of seeds)
      if (Math.hypot(x - s.tx, y - s.ty) < 55) { ok = false; break; }
    if (ok) return { x, y };
  }
  return {
    x: clamp(W * 0.5 + rnd(-W * 0.4, W * 0.4), 70, W - 70),
    y: clamp(H * 0.52 + rnd(-H * 0.36, H * 0.36), 110, H - 90),
  };
}
function spawnSeed() {
  const m = mouthPoint();
  const type = rollType(), variant = rollVariant();
  const spot = findSpot();
  seeds.push({
    type, variant,
    H: SEED_H[type] * rnd(0.95, 1.05),
    sx: m.x, sy: m.y, tx: spot.x, ty: spot.y,
    x: m.x, y: m.y,
    t: 0, dur: rnd(0.55, 0.85),
    rot: rnd(0, Math.PI * 2), spin: rnd(-3.5, 3.5),
    state: 'fly', pressT: 0,
    phase: rnd(0, Math.PI * 2), wspd: rnd(0.8, 1.4),
  });
}
function pour() {
  if (needSweep) { trashBounce = 1; return; }
  const n = Math.min(16 + (Math.random() * 6 | 0), MAX_SEEDS - seeds.length - pourQueue);
  BAG.wig = 1;
  if (n <= 0) return;
  pourQueue += n;
  playPour();
}

/* ================= 嗑开 ================= */
function crackSeed(s) {
  const i = seeds.indexOf(s);
  if (i >= 0) seeds.splice(i, 1);
  if (pressedSeed === s) pressedSeed = null;
  const gold = s.type === 'gold';
  playCrack();
  if (gold) playDing();
  if (gold) shake = { t: 0.13, mag: 3 };  // 只有金瓜子震动

  const perp = s.rot + Math.PI / 2;
  const shellH = s.H * 0.82;
  // 嗑开结果：B 2完整壳(50%) / A 2碎屑+1完整壳(30%) / C 3-4片碎屑(20%)
  const roll = Math.random();
  let pieceTypes;
  if (roll < 0.50) pieceTypes = ['shell', 'shell'];
  else if (roll < 0.80) pieceTypes = ['debris', 'debris', 'shell'];
  else pieceTypes = Math.random() < 0.5 ? ['debris', 'debris', 'debris'] : ['debris', 'debris', 'debris', 'debris'];
  // 碎屑只用 4、5
  const pickDebris = () => Math.random() < 0.5 ? 'debris4' : 'debris5';
  for (let k = 0; k < pieceTypes.length; k++) {
    const isShell = pieceTypes[k] === 'shell';
    const side = k % 2 === 0 ? -1 : 1;
    const a = perp + rnd(-0.5, 0.5);
    shells.push({
      kind: isShell ? 'shell' : 'debris',
      variant: s.variant,
      imgKey: isShell ? null : pickDebris(),
      H: isShell ? shellH : shellH * rnd(0.85, 1.05),
      side,
      x: s.x + Math.cos(a) * side * 5,
      y: s.y + Math.sin(a) * side * 5,
      vx: Math.cos(a) * side * rnd(150, 340) + rnd(-80, 80),
      vy: Math.sin(a) * side * rnd(150, 340) + rnd(-80, 80),
      rot: s.rot + rnd(-0.5, 0.5), vr: rnd(-9, 9),
      t: 0, settled: false, stamped: false, swept: false, sweepDelay: 0,
      // 每片壳的阴影各不相同：完整壳厚重，碎屑轻薄
      shAl: isShell ? rnd(0.3, 0.42) : rnd(0.15, 0.25),
      shOx: rnd(2, 4.5), shOy: rnd(3, 5.5),
      shW: isShell ? rnd(0.55, 0.68) : rnd(0.4, 0.52),
      shHr: isShell ? rnd(0.24, 0.32) : rnd(0.16, 0.24),
    });
  }

  kernels.push({
    type: s.type, variant: s.variant,
    H: s.H * (gold ? 0.72 : 0.55),  // 金仁素材自带光晕边距，画大一点补偿
    x: s.x, y: s.y, rot: s.rot,
    dx: Math.cos(s.rot - Math.PI / 2) * 30,
    dy: Math.sin(s.rot - Math.PI / 2) * 30,
    t: 0, bites: 0,
  });

  if (gold) {
    for (let k = 0; k < 16; k++) {
      const a = Math.random() * Math.PI * 2, sp = rnd(40, 220);
      goldParts.push({
        x: s.x, y: s.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
        life: rnd(0.6, 1.3), t: 0, size: rnd(3.5, 7),
      });
    }
    goldN++;
  }
  total++; bagCount++;
  refreshCounter();
  if (bagCount >= BAG_LIMIT && !needSweep) { needSweep = true; trashBounce = 1; }
}

/* ================= 壳静态层 ================= */
function stampShell(sh) { renderShell(lyx, sh); sh.stamped = true; }
function restamp() {
  lyx.clearRect(0, 0, W, H);
  for (const sh of shells) if (sh.settled) { sh.stamped = false; stampShell(sh); }
}
function renderShell(g, sh) {
  let img, aspKey;
  if (sh.kind === 'debris') {
    img = ASSETS[sh.imgKey];
    aspKey = sh.imgKey;
  } else {
    img = shellImg(sh.variant);
    aspKey = sh.variant === 'thin' ? 'shellThin' : 'shellFat';
  }
  const w = sh.H * ASP[aspKey];
  drawShadow(g, sh.x + (sh.shOx ?? 3), sh.y + (sh.shOy ?? 4), w * (sh.shW ?? 0.6), sh.H * (sh.shHr ?? 0.28), sh.shAl ?? 0.35);
  g.save();
  g.translate(sh.x, sh.y - (sh.hop || 0));
  g.rotate(sh.rot);
  if (sh.kind === 'shell' && sh.side === -1) g.scale(-1, 1);
  g.drawImage(img, -w / 2, -sh.H / 2, w, sh.H);
  g.restore();
}

/* ================= 废纸篓（插画风） ================= */
const TZ = 56;
let trashHover = 0;
let trashHoverTarget = 0;

function trashPos() { return { x: W - 46, y: H - 46 }; }
function trashHitTest(px, py) {
  const tp = trashPos();
  return Math.abs(px - tp.x) < 34 && Math.abs(py - tp.y) < 34;
}
function drawTrash(g) {
  const tp = trashPos();
  const bounce = trashBounce > 0 ? Math.sin(trashBounce * 16) * 5 * trashBounce : 0;
  const lid = trashHover;
  g.save();
  g.translate(tp.x, tp.y + bounce);

  if (needSweep) {
    g.shadowColor = 'rgba(160,110,40,0.55)';
    g.shadowBlur = 16;
  }

  // 桶身
  g.fillStyle = '#9e7e58';
  g.beginPath();
  g.moveTo(-TZ * 0.30, -TZ * 0.18);
  g.lineTo(-TZ * 0.24, TZ * 0.42);
  g.quadraticCurveTo(-TZ * 0.21, TZ * 0.48, -TZ * 0.12, TZ * 0.48);
  g.lineTo(TZ * 0.12, TZ * 0.48);
  g.quadraticCurveTo(TZ * 0.21, TZ * 0.48, TZ * 0.24, TZ * 0.42);
  g.lineTo(TZ * 0.30, -TZ * 0.18);
  g.closePath();
  g.fill();

  // 竖纹
  g.fillStyle = '#8a6d48';
  const bars = [-0.12, 0, 0.12];
  for (const bx of bars) {
    g.beginPath();
    g.moveTo(TZ * (bx - 0.025), -TZ * 0.08);
    g.lineTo(TZ * (bx - 0.020), TZ * 0.36);
    g.lineTo(TZ * (bx + 0.020), TZ * 0.36);
    g.lineTo(TZ * (bx + 0.025), -TZ * 0.08);
    g.closePath();
    g.fill();
  }

  g.shadowColor = 'transparent';
  g.shadowBlur = 0;

  // 盖子（悬停时旋转打开）
  g.save();
  g.translate(TZ * 0.30, -TZ * 0.22);
  g.rotate(lid * 0.35);
  g.translate(-TZ * 0.30, TZ * 0.22);
  // 盖面
  g.fillStyle = '#b8956a';
  g.beginPath();
  g.roundRect(-TZ * 0.36, -TZ * 0.30, TZ * 0.72, TZ * 0.10, 3);
  g.fill();
  // 把手
  g.fillStyle = '#a68455';
  g.beginPath();
  g.roundRect(-TZ * 0.10, -TZ * 0.40, TZ * 0.20, TZ * 0.12, 3);
  g.fill();
  g.restore();

  g.restore();
}

/* ================= 摸鱼模式 ================= */
let fishMode = false;
let fishHover = 0, fishHoverTarget = 0, fishHoverTime = 0, fishBounce = 0;

function fishPos() { return { x: W - 118, y: H - 44 }; }
function fishHitTest(px, py) {
  const fp = fishPos();
  return Math.abs(px - fp.x) < 28 && Math.abs(py - fp.y) < 28;
}
function drawFish(g) {
  const alpha = Math.max(fishHover, fishMode ? 0.45 : 0);
  if (alpha < 0.01) return;
  const fp = fishPos();
  const bounce = fishBounce > 0 ? Math.sin(fishBounce * 16) * 4 * fishBounce : 0;
  const FZ = 48;
  g.save();
  g.globalAlpha = alpha;
  g.translate(fp.x, fp.y + bounce);

  // 鱼身（与废纸篓同色系；开启时米灰色）
  g.fillStyle = fishMode ? '#b8b0a0' : '#9e7e58';
  g.beginPath();
  g.ellipse(-FZ * 0.06, 0, FZ * 0.30, FZ * 0.20, 0, 0, Math.PI * 2);
  g.fill();
  // 尾巴
  g.fillStyle = fishMode ? '#a39a88' : '#8a6d48';
  g.beginPath();
  g.moveTo(FZ * 0.20, 0);
  g.lineTo(FZ * 0.42, -FZ * 0.18);
  g.lineTo(FZ * 0.42, FZ * 0.18);
  g.closePath();
  g.fill();
  // 背鳍
  g.beginPath();
  g.moveTo(-FZ * 0.10, -FZ * 0.16);
  g.quadraticCurveTo(-FZ * 0.02, -FZ * 0.34, FZ * 0.10, -FZ * 0.16);
  g.closePath();
  g.fill();
  // 眼睛
  g.fillStyle = '#4a3a26';
  g.beginPath();
  g.arc(-FZ * 0.22, -FZ * 0.04, FZ * 0.035, 0, Math.PI * 2);
  g.fill();
  // 开启状态：身上一个小气泡提示
  if (fishMode) {
    g.fillStyle = 'rgba(184,176,160,0.9)';
    g.beginPath();
    g.arc(-FZ * 0.34, -FZ * 0.26, 3.5, 0, Math.PI * 2);
    g.fill();
  }
  g.restore();

  // 悬停久了显示提示
  const tipA = clamp((fishHoverTime - 0.8) / 0.3, 0, 1);
  if (tipA > 0.01) {
    const txt = fishMode ? '摸鱼模式开启中：嗑瓜子声已伪装成鼠标声' : '摸鱼模式';
    g.save();
    g.globalAlpha = tipA;
    g.font = '500 12px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
    const tw = g.measureText(txt).width;
    const bx = Math.min(fp.x, W - tw / 2 - 16), by = fp.y - 48;
    g.fillStyle = 'rgba(73,58,40,0.92)';
    g.beginPath();
    g.roundRect(bx - tw / 2 - 10, by - 13, tw + 20, 26, 13);
    g.fill();
    g.fillStyle = '#f5edda';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(txt, bx, by);
    g.restore();
  }
}

/* ================= 扫一扫 ================= */
function sweep() {
  if (!shells.length) return;
  ensureAudio(); playSweep();
  for (const sh of shells) {
    sh.swept = true; sh.settled = false;
    sh.sweepDelay = (sh.x / W) * 0.22 + rnd(0, 0.06);
    sh.vx = rnd(850, 1250); sh.vy = rnd(-90, 90); sh.vr = rnd(-12, 12);
  }
  lyx.clearRect(0, 0, W, H);
  if (needSweep) { needSweep = false; bagCount = 0; }
}

/* ================= 输入 ================= */
function hitSeed(px, py) {
  for (let i = seeds.length - 1; i >= 0; i--) {
    const s = seeds[i];
    if (s.state !== 'idle') continue;
    const dx = px - s.x, dy = py - s.y;
    const c = Math.cos(-s.rot), sn = Math.sin(-s.rot);
    const lx = dx * c - dy * sn, ly = dx * sn + dy * c;
    const aspK = s.variant === 'thin' ? 'seedThin' : 'seedFat';
    const w = s.H * ASP[aspK];
    const rx = w * 0.52, ry = s.H * 0.52;
    if ((lx * lx) / (rx * rx) + (ly * ly) / (ry * ry) < 1) return s;
  }
  return null;
}
cv.addEventListener('pointerdown', e => {
  ensureAudio();
  unlockAudio();
  if (trashHitTest(e.clientX, e.clientY)) { sweep(); return; }
  if (fishHitTest(e.clientX, e.clientY)) { fishMode = !fishMode; fishBounce = 1; return; }
  const s = hitSeed(e.clientX, e.clientY);
  if (s) { pressedSeed = s; return; }
  if (bagHitTest(e.clientX, e.clientY)) pour();
});
window.addEventListener('pointerup', () => { if (pressedSeed) crackSeed(pressedSeed); });
cv.addEventListener('pointermove', e => {
  const onTrash = trashHitTest(e.clientX, e.clientY);
  trashHoverTarget = onTrash ? 1 : 0;
  const onFish = fishHitTest(e.clientX, e.clientY);
  fishHoverTarget = onFish ? 1 : 0;
  const onBag = bagHitTest(e.clientX, e.clientY);
  bagHoverTarget = onBag ? 1 : 0;
  const h = !!hitSeed(e.clientX, e.clientY) || onBag || onTrash || onFish;
  if (h !== hoverPtr) { hoverPtr = h; cv.style.cursor = h ? 'pointer' : 'default'; }
});
window.addEventListener('blur', () => { pressedSeed = null; });

/* ================= 更新 ================= */
let lastBagHint = -2;  // 首次提示提前：加载约 1s 后就晃袋子
function update(dt) {
  now += dt;
  updateBGM();
  if (pourQueue > 0) { pourTimer -= dt; if (pourTimer <= 0) { spawnSeed(); pourQueue--; pourTimer = 0.05; } }
  if (BAG.wig > 0) BAG.wig = Math.max(0, BAG.wig - dt * 2.2);
  if (!seeds.length && !pourQueue && !needSweep && now - lastBagHint > 3) { lastBagHint = now; BAG.wig = 0.7; }

  for (const s of seeds) {
    if (s.state === 'fly') {
      s.t += dt;
      const p = Math.min(1, s.t / s.dur), e = easeOutCubic(p);
      s.x = lerp(s.sx, s.tx, e); s.y = lerp(s.sy, s.ty, e);
      s.hop = Math.sin(Math.PI * p) * 38;
      s.drawRot = s.rot + s.spin * (1 - (1 - p) * (1 - p)) - s.spin;
      if (p >= 1) { s.state = 'idle'; s.hop = 0; }
    }
    s.pressT += ((pressedSeed === s ? 1 : 0) - s.pressT) * Math.min(1, dt * 18);
  }

  for (let i = shells.length - 1; i >= 0; i--) {
    const sh = shells[i];
    if (sh.swept) {
      if (sh.sweepDelay > 0) { sh.sweepDelay -= dt; continue; }
      sh.x += sh.vx * dt; sh.y += sh.vy * dt; sh.rot += sh.vr * dt;
      if (sh.x > W + 120) shells.splice(i, 1);
      continue;
    }
    if (sh.settled) continue;
    sh.t += dt;
    sh.hop = Math.sin(Math.PI * Math.min(1, sh.t / 0.38)) * 15;
    sh.x += sh.vx * dt; sh.y += sh.vy * dt; sh.rot += sh.vr * dt;
    const damp = Math.exp(-5.5 * dt);
    sh.vx *= damp; sh.vy *= damp; sh.vr *= damp;
    if (sh.x < 24) { sh.x = 24; sh.vx = Math.abs(sh.vx) * 0.5; }
    if (sh.x > W - 24) { sh.x = W - 24; sh.vx = -Math.abs(sh.vx) * 0.5; }
    if (sh.y < 70) { sh.y = 70; sh.vy = Math.abs(sh.vy) * 0.5; }
    if (sh.y > H - 24) { sh.y = H - 24; sh.vy = -Math.abs(sh.vy) * 0.5; }
    if (sh.t > 0.38 && Math.hypot(sh.vx, sh.vy) < 10) { sh.settled = true; sh.hop = 0; stampShell(sh); }
  }

  for (let i = kernels.length - 1; i >= 0; i--) {
    const k = kernels[i];
    k.t += dt;
    if (k.type === 'gold') {
      // 发光停留 1.5s 后飞向右上角计数，0.8s 到达
      if (k.t > 2.3) {
        kernels.splice(i, 1);
        goldShown = goldN;
        refreshCounter();
        goldCounterEl.animate(
          [{ transform: 'scale(1.5)' }, { transform: 'scale(1)' }],
          { duration: 280, easing: 'ease-out' }
        );
      }
      continue;
    }
    // 普通仁：停留后被分两口吃掉
    const stage = k.t > 1.0 ? 2 : k.t > 0.7 ? 1 : 0;
    if (stage > k.bites) {
      if (k.bites === 0) playEat();  // 只在第一口播一次
      k.bites = stage;
      const p = Math.min(1, k.t / 0.4);
      const cx = k.x + k.dx * p, cy = k.y + k.dy * p;
      for (let c = 0; c < 3; c++)
        crumbs.push({
          x: cx + rnd(-10, 10), y: cy + rnd(-10, 10),
          vx: rnd(-70, 70), vy: rnd(-80, 10),
          life: rnd(0.3, 0.5), t: 0, size: rnd(1.5, 3),
        });
    }
    if (stage >= 2) kernels.splice(i, 1);
  }
  for (let i = crumbs.length - 1; i >= 0; i--) {
    const c = crumbs[i]; c.t += dt;
    if (c.t > c.life) { crumbs.splice(i, 1); continue; }
    c.x += c.vx * dt; c.y += c.vy * dt;
    c.vy += 160 * dt;
  }

  for (let i = goldParts.length - 1; i >= 0; i--) {
    const p = goldParts[i]; p.t += dt;
    if (p.t > p.life) { goldParts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    const damp = Math.exp(-4 * dt); p.vx *= damp; p.vy *= damp;
  }
  if (shake.t > 0) shake.t -= dt;
  if (trashBounce > 0) trashBounce = Math.max(0, trashBounce - dt * 1.8);
  trashHover += (trashHoverTarget - trashHover) * Math.min(1, dt * 10);
  fishHover += (fishHoverTarget - fishHover) * Math.min(1, dt * 8);
  fishHoverTime = fishHoverTarget ? fishHoverTime + dt : 0;
  if (fishBounce > 0) fishBounce = Math.max(0, fishBounce - dt * 1.8);
  bagHover += (bagHoverTarget - bagHover) * Math.min(1, dt * 8);
}

/* ================= 渲染 ================= */
function hourTint() {
  const h = new Date().getHours();
  if (h >= 6 && h < 10) return 'rgba(150,185,255,0.04)';
  if (h >= 16 && h < 19) return 'rgba(255,150,60,0.05)';
  return null;
}
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake.t > 0) { const m = shake.mag * (shake.t / 0.13); ctx.translate(rnd(-m, m), rnd(-m, m)); }
  ctx.drawImage(bg, 0, 0, W, H);
  ctx.drawImage(layer, 0, 0, W, H);

  // 移动中的壳
  for (const sh of shells) { if (sh.settled && !sh.swept) continue; renderShell(ctx, sh); }

  // 仁
  for (const k of kernels) {
    const p = Math.min(1, k.t / 0.4);
    const x = k.x + k.dx * easeOutCubic(p);
    const y = k.y + k.dy * easeOutCubic(p) - Math.sin(Math.PI * Math.min(1, k.t / 0.5)) * 22;
    const sc = k.t < 0.16 ? easeOutCubic(k.t / 0.16) * 1.15 : Math.max(1, 1.15 - (k.t - 0.16) * 0.5);
    const kImg = kernelImg(k.type, k.variant);
    const kAsp = k.type === 'gold' ? ASP.kernelGold : ASP[k.variant === 'thin' ? 'kernelThin' : 'kernelFat'];
    const kw = k.H * kAsp;

    if (k.type === 'gold') {
      // 飞向右上角：三次缓动沿贝塞尔弧线，光晕渐隐
      let gx = x, gy = y, gsc = sc, grot = k.rot, glowMul = 1;
      if (k.t > 1.5) {
        const f = Math.min(1, (k.t - 1.5) / 0.8);
        const e = f < 0.5 ? 4 * f * f * f : 1 - Math.pow(-2 * f + 2, 3) / 2;
        const tx = W - 70, ty = 32;
        const mx = (x + tx) / 2, my = Math.min(y, ty) - 90;
        const u = 1 - e;
        gx = u * u * x + 2 * u * e * mx + e * e * tx;
        gy = u * u * y + 2 * u * e * my + e * e * ty;
        gsc = lerp(sc, 30 / k.H, e);
        grot = k.rot * (1 - e);
        glowMul = 1 - f * 0.75;
      } else {
        drawShadow(ctx, x, y + 6, kw * 0.55, k.H * 0.3, 0.25);
      }
      // 柔和渐变光晕
      const ga = (0.3 + 0.1 * Math.sin(now * 3.2)) * glowMul;
      const gr = k.H * gsc * 1.2;
      const rg = ctx.createRadialGradient(gx, gy, gr * 0.12, gx, gy, gr);
      rg.addColorStop(0, 'rgba(255,219,120,' + ga.toFixed(3) + ')');
      rg.addColorStop(0.6, 'rgba(255,219,120,' + (ga * 0.4).toFixed(3) + ')');
      rg.addColorStop(1, 'rgba(255,219,120,0)');
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI * 2); ctx.fill();
      ctx.save();
      ctx.translate(gx, gy); ctx.rotate(grot); ctx.scale(gsc, gsc);
      ctx.drawImage(kImg, -kw / 2, -k.H / 2, kw, k.H);
      ctx.restore();
      continue;
    }

    // 普通仁：分两口啃掉
    const bites = k.bites;
    drawShadow(ctx, x, y + 6, kw * 0.6 * (1 - bites * 0.35), k.H * 0.32 * (1 - bites * 0.3), 0.28);
    ctx.save();
    ctx.translate(x, y); ctx.rotate(k.rot); ctx.scale(sc, sc);
    if (bites > 0) {
      const bitY = bites === 1 ? -k.H * 0.05 : k.H * 0.25;
      const bw = kw * 1.3;
      const step = bw / 3;
      ctx.beginPath();
      ctx.moveTo(-bw / 2, bitY);
      for (let b = 0; b < 3; b++) ctx.arc(-bw / 2 + step * (b + 0.5), bitY, step / 2, Math.PI, 0, true);
      ctx.lineTo(bw / 2, k.H);
      ctx.lineTo(-bw / 2, k.H);
      ctx.closePath();
      ctx.clip();
    }
    ctx.drawImage(kImg, -kw / 2, -k.H / 2, kw, k.H);
    ctx.restore();
  }

  // 嚼渣
  for (const c of crumbs) {
    const f = 1 - c.t / c.life;
    ctx.globalAlpha = f * 0.9;
    ctx.fillStyle = '#d9bc8a';
    ctx.beginPath(); ctx.arc(c.x, c.y, c.size * f, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 瓜子
  for (const s of seeds) {
    const aspK = s.variant === 'thin' ? 'seedThin' : 'seedFat';
    const img = SPRITES[aspK];
    const w = s.H * ASP[aspK];
    const idle = s.state === 'idle';
    const hop = (s.hop || 0) + (idle ? Math.sin(now * s.wspd * 1.6 + s.phase) * 1.6 : 0);
    const wobble = idle ? Math.sin(now * s.wspd + s.phase * 1.7) * 0.022 : 0;
    const shAl = s.state === 'fly' ? 0.2 + 0.35 * Math.min(1, s.t / s.dur) : 0.5;
    drawShadow(ctx, s.x + 3, s.y + 5, w * 0.55, s.H * 0.38, shAl);
    ctx.save();
    ctx.translate(s.x, s.y - hop);
    ctx.rotate((s.state === 'fly' ? (s.drawRot ?? s.rot) : s.rot) + wobble);
    const pr = s.pressT;
    ctx.scale(1 + 0.08 * pr, 1 - 0.12 * pr);
    if (s.state === 'fly') { const p = Math.min(1, s.t / s.dur); ctx.scale(0.6 + 0.4 * easeOutCubic(p), 0.6 + 0.4 * easeOutCubic(p)); }
    ctx.drawImage(img, -w / 2, -s.H / 2, w, s.H);
    ctx.restore();
  }

  // 金星
  for (const p of goldParts) {
    const f = 1 - p.t / p.life;
    ctx.globalAlpha = f;
    const r = p.size * (0.6 + 0.4 * Math.sin(p.t * 18));
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.t * 4);
    ctx.beginPath();
    for (let k = 0; k < 4; k++) { const a = k * Math.PI / 2; ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * r * 2, Math.sin(a) * r * 2); }
    ctx.strokeStyle = '#ffd76e'; ctx.lineWidth = 1.6; ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  drawBag(ctx);
  ctx.restore();

  drawTrash(ctx);
  drawFish(ctx);
  ctx.fillStyle = noisePat; ctx.fillRect(0, 0, W, H);
  const t = hourTint();
  if (t) { ctx.fillStyle = t; ctx.fillRect(0, 0, W, H); }
}

/* ================= 主循环 ================= */
let last = performance.now();
function loop(ts) {
  const dt = Math.min(0.033, (ts - last) / 1000); last = ts;
  update(dt); render();
  requestAnimationFrame(loop);
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  for (const [c, g] of [[cv, ctx], [bg, bgx], [layer, lyx]]) {
    c.width = W * DPR; c.height = H * DPR;
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  noisePat = ctx.createPattern(noiseC, 'repeat');
  bagMetrics();
  for (const s of seeds) {
    s.tx = clamp(s.tx, 60, W - 60); s.ty = clamp(s.ty, 100, H - 60);
    s.x = clamp(s.x, 60, W - 60); s.y = clamp(s.y, 100, H - 60);
  }
  for (const sh of shells) { sh.x = clamp(sh.x, 24, W - 24); sh.y = clamp(sh.y, 70, H - 24); }
  paintBG(); restamp();
}
window.addEventListener('resize', resize);
resize();
startBGM();
requestAnimationFrame(loop);

/* 冒烟测试 */
if (location.search.includes('autotest')) {
  setTimeout(() => {
    let n = 0;
    for (let i = 0; i < 10; i++) { spawnSeed(); const s = seeds[seeds.length - 1]; s.state = 'idle'; s.x = s.tx; s.y = s.ty; s.hop = 0; s.t = s.dur; }
    seeds[0].type = 'gold';  // 固定出一颗金瓜子验证流程
    for (const s of [...seeds]) { if (n >= 5) break; crackSeed(s); n++; }
    for (const sh of shells) { sh.x += sh.vx * 0.25; sh.y += sh.vy * 0.25; sh.rot += sh.vr * 0.2; sh.vx = sh.vy = sh.vr = 0; sh.t = 1; sh.hop = 0; }
    console.log('[autotest] cracked', n, 'shells', shells.length);
  }, 2200);
}
/* 压测：?stress 直接铺满 800 颗，量 60 帧平均耗时写进标题 */
if (location.search.includes('stress')) {
  while (seeds.length < MAX_SEEDS) {
    spawnSeed();
    const s = seeds[seeds.length - 1];
    s.state = 'idle'; s.x = s.tx; s.y = s.ty; s.hop = 0; s.t = s.dur;
  }
  render();
  const t0 = Date.now();
  for (let i = 0; i < 60; i++) { update(1 / 60); render(); }
  document.title = 'frame_ms:' + ((Date.now() - t0) / 60).toFixed(2);
}

} // end init
</script>
